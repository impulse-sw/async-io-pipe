# Generated by Deployer 2.X
name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  TERM: xterm

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Preflight
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          target: x86_64-unknown-linux-gnu
          toolchain: 1.92.0

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            Cargo.lock
            target
          key: ${{ steps.extract_branch.outputs.branch }}-${{ runner.os }}-build

      - name: Run pipeline
        run: |
          chmod +x .github/workflows/.pipe.build.sh
          ./.github/workflows/.pipe.build.sh

      - name: Save cache
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: |
            Cargo.lock
            target
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

